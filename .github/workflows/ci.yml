name: CI

# 언제 실행할지 정의
on:
  # PR이 main 브랜치를 대상으로 생성/업데이트될 때
  pull_request:
    branches: [main]
  # main 브랜치에 직접 push할 때
  push:
    branches: [main]

# 같은 PR에서 새 커밋이 push되면 이전 실행을 취소
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint → Type Check → Build
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2. Node.js 설치 + npm 캐시 활성화
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      # 3. 의존성 설치
      - name: Install dependencies
        run: npm ci

      # 4. ESLint 코드 품질 검사
      - name: Lint
        run: npm run lint

      # 5. TypeScript 타입 검사
      - name: Type Check
        run: npm run type-check

      # 6. 프로덕션 빌드
      - name: Build
        run: npm run build
